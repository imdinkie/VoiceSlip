name: Android Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag name for creating a draft GitHub Release, for example v1.0.0
        required: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          VOICESLIP_KEYSTORE_BASE64: ${{ secrets.VOICESLIP_KEYSTORE_BASE64 }}
        run: |
          test -n "$VOICESLIP_KEYSTORE_BASE64"
          printf '%s' "$VOICESLIP_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/voiceslip-release.jks"

      - name: Build signed release artifacts
        env:
          VOICESLIP_STORE_FILE: ${{ runner.temp }}/voiceslip-release.jks
          VOICESLIP_STORE_PASSWORD: ${{ secrets.VOICESLIP_STORE_PASSWORD }}
          VOICESLIP_KEY_ALIAS: ${{ secrets.VOICESLIP_KEY_ALIAS }}
          VOICESLIP_KEY_PASSWORD: ${{ secrets.VOICESLIP_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Generate checksums
        run: |
          cd app/build/outputs
          sha256sum apk/release/app-release.apk bundle/release/app-release.aab > voiceslip-release.sha256

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voiceslip-release-artifacts
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/voiceslip-release.sha256
          if-no-files-found: error

      - name: Create draft GitHub Release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/bundle/release/app-release.aab \
            app/build/outputs/voiceslip-release.sha256 \
            --draft \
            --target "$GITHUB_SHA" \
            --title "VoiceSlip $RELEASE_TAG" \
            --notes "Signed Android release artifacts."
